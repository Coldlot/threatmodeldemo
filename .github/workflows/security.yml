name: Security Scan

on:
  pull_request:
    branches: [ main, develop ]
  push:
    branches: [ main, develop ]
  workflow_dispatch:

jobs:
  semgrep:
    name: Semgrep SAST
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
      actions: read
    container:
      image: returntocorp/semgrep
      volumes:
        - ${{ github.workspace }}:/src
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Semgrep with local rules
        id: semgrep_scan
        working-directory: /src
        run: |
          semgrep scan \
            --config=auto \
            --config=/src/semgrep-rules/swift \
            --config=/src/semgrep-rules/secrets \
            --config=/src/semgrep-rules/owasp-top-ten \
            --exclude /src/semgrep-rules \
            --error \
            --sarif > /src/semgrep.sarif
          
          echo "=== SEMGREP FINDINGS ==="
          cat /src/semgrep.sarif | grep -A 5 '"level"' || echo "No findings or SARIF empty"
          echo "=== END ==="

      - name: Upload SARIF as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: semgrep-results
          path: /src/semgrep.sarif

      - name: Upload SARIF to GitHub Security Dashboard
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: /src/semgrep.sarif

  codeql:
    name: CodeQL Analysis
    runs-on: macos-latest
    permissions:
      security-events: write
      actions: read
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: swift
      - name: Build Swift project
        run: |
          xcodebuild build \
            -project ThreatModelDemo.xcodeproj \
            -scheme ThreatModelDemo \
            -sdk iphonesimulator \
            -destination 'generic/platform=iOS Simulator' \
            CODE_SIGNING_ALLOWED=NO
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3